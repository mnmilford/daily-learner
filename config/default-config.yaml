timezone: "America/Chicago"

sources:
  memory_dir: "~/.openclaw/workspace/memory"
  memory_pattern: "{date}.md"
  openclaw_log_dir: "/tmp/openclaw"
  openclaw_log_pattern: "openclaw-{date}.log"
  session_dir: "~/.openclaw/agents/main/sessions"
  session_index: "~/.openclaw/agents/main/sessions/sessions.json"

llm:
  provider: "gemini"
  model: "gemini-2.5-flash"
  api_key_source: "openclaw_config"  # reads from ~/.openclaw/openclaw.json env.GEMINI_API_KEY
  max_input_tokens: 8000
  max_output_tokens: 4000
  temperature: 0.7
  thinking_budget: 0

pipeline:
  topics_per_day: 7
  bonus_ratio: 0.3        # ~30% bonus/related topics injected
  flashcards_per_topic: 2
  questions_per_topic: 1
  challenges_per_batch: 1

review:
  new_ratio: 0.60
  review_ratio: 0.25
  bonus_ratio: 0.15
  spacing_intervals: [1, 3, 7, 14, 30]
  graduation_threshold: 3   # times reviewed at confidence 5
  low_confidence_cutoff: 2   # resets to interval[0]

data_dir: "~/.daily-learner"
